version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: spoko-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: spoko_db
      POSTGRES_USER: spoko_user
      POSTGRES_PASSWORD: Sop0t#2137!
    volumes:
      - spoko_pgdata:/var/lib/postgresql/data

volumes:
  spoko_pgdata:
